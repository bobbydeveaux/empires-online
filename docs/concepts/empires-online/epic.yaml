    project: backend
    type: enabler
  - Sprint: 2
    dependencies:
    - empires-online-feat-alembic-setup
    - empires-online-feat-websocket-backend
    description: 'Implement recruit_people action (cost 2 gold, +1 person) and acquire_territory
      action (cost 3 gold, +1 territory) in GameLogic with server-side validation
      via can_perform_action(). Add stability check: if revolters > supporters at
      round end, deduct gold equal to the difference (floor 0). Add end-actions endpoint
      and automatic phase transitions (actions→next round when all actions_completed=True).
      Add round summary endpoint returning per-player changes. Broadcast state updates
      via WebSocket after each action.'
    estimatedComplexity: medium
    files:
    - backend/app/services/game_logic.py
    - backend/app/services/game_broadcast.py
    - backend/app/schemas/schemas.py
    - backend/app/api/routes/games.py
    id: empires-online-feat-actions-stability
    name: New Actions, Stability Check & Phase Transitions
    project: backend
    type: feature
