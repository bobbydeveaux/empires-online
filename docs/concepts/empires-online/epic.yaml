    name: Mobile Responsive UI & Toast Notifications
    project: frontend
    type: feature
  - Sprint: 6
    dependencies:
    - empires-online-feat-websocket-backend
    - empires-online-feat-actions-stability
    description: Add unit tests for recruit_people, acquire_territory, stability check,
      and WebSocket broadcasting. Add integration tests for all API endpoints including
